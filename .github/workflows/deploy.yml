name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.git' --exclude='node_modules' --exclude='data/' --exclude='public/screenshots/*.png' --exclude='.env'
          path: ./
          remote_path: /opt/enshittification-tracker/
          remote_host: 45.61.50.215
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Post-deploy setup
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 45.61.50.215
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/enshittification-tracker
            npm install --production
            mkdir -p data public/screenshots
            # Install pm2 globally if not present
            which pm2 || npm install -g pm2
            # Restart or start the app
            pm2 describe enshittindex > /dev/null 2>&1 && pm2 restart enshittindex || pm2 start ecosystem.config.js
            pm2 save
